<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Cat Theme 🐾</title>
    <!-- นำเข้า Google Fonts เพื่อความน่ารัก -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&family=Mitr:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        /* สไตล์หลักและธีมสีพาสเทล ส้ม-เหลือง */
        body {
            font-family: 'Mitr', 'Chakra Petch', sans-serif;
            background: linear-gradient(135deg, #ffe5b4 0%, #ffcc99 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: #ffffff; /* ตัวอักษรสีขาว */
        }

        /* การ์ดหลักทรงมน */
        .container {
            background: rgba(255, 153, 51, 0.4); /* ส้มพาสเทลโปร่งแสง */
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* ตกแต่งลายน้องแมวรอบๆ */
        .container::before {
            content: "🐾 🐱 🐾";
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            letter-spacing: 10px;
            opacity: 0.8;
        }

        h1 {
            font-size: 26px;
            margin-top: 15px;
            margin-bottom: 25px;
            font-weight: 500;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.15);
        }

        /* ปุ่มกดดีไซน์อุ้งเท้าแมว */
        .btn-start {
            background-color: #ff9933;
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 50px;
            padding: 12px 35px;
            font-size: 18px;
            font-family: 'Mitr', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 153, 51, 0.3);
            margin-bottom: 25px;
        }

        .btn-start:hover {
            background-color: #ffaa44;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 153, 51, 0.4);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        /* กรอบแสดงผล Webcam ดีไซน์หูแมว */
        #webcam-container {
            margin: 20px auto;
            border: 6px solid #ffffff;
            border-radius: 24px;
            width: 200px;
            height: 200px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            background-color: rgba(255, 255, 255, 0.2);
            position: relative;
        }

        /* ทำให้ Canvas แสดงผลเต็มกรอบ */
        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* กล่องแสดงผลลัพธ์ */
        #label-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* แถบเปอร์เซ็นต์แต่ละ Class */
        .label-row {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            padding: 10px 20px;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Teachable Machine Image Model</h1>
        <button type="button" class="btn-start" onclick="init()"> Start 🐾 </button>
        
        <div id="webcam-container"></div>
        <div id="label-container"></div>
    </div>

    <!-- Script ของ TensorFlow และ Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ลิงก์โมเดลของคุณจากระบบ
        const URL = "https://teachablemachine.withgoogle.com/models/07LFF4wb1/";

        let model, webcam, labelContainer, maxPredictions;
        let predictInterval; // ตัวแปรสำหรับคุมความถี่ 3 วินาที

        // โหลดโมเดลและตั้งค่าเว็บแคม
        async function init() {
            // ซ่อนปุ่มเริ่มหลังจากกดเพื่อความสวยงาม
            document.querySelector('.btn-start').style.display = 'none';

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); 
            await webcam.play();
            
            // ใช้ฟังก์ชันเว็บแคมลูปแบบปกติเพื่อให้ภาพในกล้องเคลื่อนไหวลื่นไหล (ไม่กระตุก)
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            
            // สร้างโครงสร้างการ์ดสำหรับแสดงผลลัพธ์
            for (let i = 0; i < maxPredictions; i++) { 
                let labelRow = document.createElement("div");
                labelRow.className = "label-row";
                labelContainer.appendChild(labelRow);
            }

            // สั่งให้ทำนายผลครั้งแรกทันทีที่เปิด
            await predict();

            // ⏱️ ส่วนสำคัญ: ตั้งค่าให้ฟังก์ชัน predict ทำงานใหม่ทุกๆ 3 วินาที (3000ms)
            predictInterval = setInterval(async () => {
                await predict();
            }, 3000);
        }

        async function loop() {
            webcam.update(); // อัปเดตเฟรมภาพกล้อง (เพื่อให้ภาพเคลื่อนไหวลื่นไหล 60fps)
            window.requestAnimationFrame(loop);
        }

        // ฟังก์ชันทำนายผลลัพธ์ที่จะทำงานทุกๆ 3 วินาที
        async function predict() {
            if (!model || !webcam) return;
            
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                // คำนวณเปอร์เซ็นต์ความแม่นยำ
                const percentage = (prediction[i].probability * 100).toFixed(0);
                
                // ออกแบบการแสดงผลให้ออกมาเป็นการ์ดแยกข้อความและเปอร์เซ็นต์สวยงาม
                const classPrediction = `
                    <span>🐱 ${prediction[i].className}</span>
                    <strong>${percentage}%</strong>
                `;
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>
</body>
</html>
