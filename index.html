<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าจอธีม Xiao Genshin Impact</title>
    <style>
        /* กำหนดรูปแบบหลักของหน้าจอ */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0c1c1a; /* สีดำโทนเขียวเข้มแบบ Xiao */
            color: #ffffff; /* ตัวอักษรสีขาว */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: linear-gradient(135deg, #0c1c1a 0%, #1e4d46 100%); /* เพิ่มการไล่ระดับสี */
        }

        /* กล่องเนื้อหาหลัก */
        .container {
            background-color: rgba(26, 61, 57, 0.8); /* สีเขียวเข้มแบบโปร่งแสง */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 127, 0.5); /* เงาสีเขียวมรกต */
            text-align: center;
            width: 80%;
            max-width: 600px;
            border: 2px solid #00ff7f; /* เส้นขอบสีเขียวมรกต */
        }

        /* หัวข้อหลัก */
        h1 {
            color: #ffffff; /* ตัวอักษรสีขาว */
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff7f; /* เพิ่มเรืองแสงสีเขียว */
        }

        /* สไตล์ข้อความแสดงเวลา */
        .timer-text {
            font-size: 24px;
            color: #ffffff; /* ตัวอักษรสีขาว */
            margin-bottom: 10px;
        }

        /* กล่องแสดงผลการทำงาน */
        #activity-log {
            background-color: rgba(0, 0, 0, 0.5);
            color: #00ff7f; /* ตัวอักษรสีเขียวมรกต */
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            height: 150px;
            overflow-y: auto;
            text-align: left;
            border: 1px solid #00ff7f;
        }

        /* สไตล์ปุ่ม */
        .button {
            background-color: #00ff7f; /* สีเขียวมรกต */
            color: #0c1c1a; /* ตัวอักษรสีเข้ม */
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        .button:hover {
            background-color: #00cc66; /* สีเขียวเข้มขึ้นเมื่อเอาเมาส์ไปชี้ */
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Xiao's Vigil</h1>
        <p class="timer-text">สถานะ: <span id="status">กำลังรอ...</span></p>
        <p>เวลาผ่านไป: <span id="timer">0</span> วินาที</p>
        <div id="activity-log"></div>
        <button id="startStopBtn" class="button">เริ่มการทำงาน</button>
    </div>

    <script>
        let timerInterval;
        let elapsedSeconds = 0;
        let isRunning = false;
        const statusEl = document.getElementById('status');
        const timerEl = document.getElementById('timer');
        const logEl = document.getElementById('activity-log');
        const startStopBtn = document.getElementById('startStopBtn');

        function updateLog(message) {
            logEl.innerHTML += `<p>> ${message}</p>`;
            logEl.scrollTop = logEl.scrollHeight; // เลื่อนสกอลล์บาร์ลงล่างสุด
        }

        function toggleTimer() {
            if (isRunning) {
                // หยุดการทำงาน
                clearInterval(timerInterval);
                statusEl.innerText = 'หยุด';
                statusEl.style.color = '#ff6347'; // สีส้มแดง
                startStopBtn.innerText = 'เริ่มการทำงาน';
                updateLog('การทำงานหยุดลงแล้ว...');
            } else {
                // เริ่มการทำงาน
                statusEl.innerText = 'กำลังทำงาน...';
                statusEl.style.color = '#00ff7f'; // สีเขียวมรกต
                startStopBtn.innerText = 'หยุดการทำงาน';
                elapsedSeconds = 0;
                timerEl.innerText = elapsedSeconds;
                logEl.innerHTML = ''; // เคลียร์ล็อก
                updateLog('เริ่มการทำงาน... จะมีกิจกรรมทุกๆ 3 วินาที');

                timerInterval = setInterval(() => {
                    elapsedSeconds++;
                    timerEl.innerText = elapsedSeconds;

                    if (elapsedSeconds % 3 === 0) {
                        // กิจกรรมที่จะทำทุกๆ 3 วินาที
                        const timestamp = new Date().toLocaleTimeString();
                        updateLog(`[${timestamp}] Xiao ปราบปีศาจ...`);
                    }
                }, 1000); // อัปเดตเวลาทุกวินาที
            }
            isRunning = !isRunning;
        }

        startStopBtn.addEventListener('click', toggleTimer);
    </script>
</body>
</html>
