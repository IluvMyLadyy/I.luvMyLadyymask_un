<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Cat Theme 🐾</title>
    <!-- นำเข้า Google Fonts เพื่อความน่ารัก -->
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffe5b4 0%, #ffcc99 100%);
            --card-bg: rgba(255, 165, 79, 0.65);
            --btn-color: #ff9933;
            --btn-hover: #e67e22;
            --text-white: #ffffff;
        }

        body {
            font-family: 'Mitr', 'Chakra Petch', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-white);
        }

        /* กล่องคอนเทนเนอร์หลัก */
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 4px solid rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* ตกแต่งลายน้องแมวรอบๆ กล่อง */
        .container::before {
            content: "🐾";
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 24px;
            opacity: 0.7;
        }

        .container::after {
            content: "🐱";
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 28px;
            opacity: 0.7;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            font-weight: 500;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.15);
            color: var(--text-white);
        }

        /* ปุ่มกดสไตล์มินิมอลน่ารัก */
        .btn-start {
            background-color: var(--btn-color);
            color: var(--text-white);
            border: 2px solid rgba(255, 255, 255, 0.6);
            padding: 12px 35px;
            font-size: 18px;
            font-family: 'Mitr', sans-serif;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 153, 51, 0.3);
            margin-bottom: 25px;
        }

        .btn-start:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(255, 153, 51, 0.4);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        /* ส่วนแสดงผลเว็บแคม */
        #webcam-container {
            margin: 20px auto;
            border-radius: 50%; /* ทำกรอบวงกลมเพิ่มความคิ้วท์ */
            overflow: hidden;
            width: 200px;
            height: 200px;
            border: 6px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            display: none; /* ซ่อนไว้ก่อนกด Start */
            background-color: rgba(255,255,255,0.2);
        }

        #webcam-container canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ส่วนแสดงผลตัวอักษรผลลัพธ์ */
        #label-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #label-container div {
            background: rgba(255, 255, 255, 0.25);
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 400;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            color: var(--text-white);
            animation: fadeIn 0.5s ease;
        }

        /* อิมพอร์ตเอฟเฟกต์ตกแต่งเพิ่มเติม */
        .decor-paws {
            font-size: 18px;
            margin-top: 15px;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐱 TM Image Model 🐾</h1>
        <button type="button" class="btn-start" onclick="init()">Start Camera ✨</button>
        
        <div id="webcam-container"></div>
        <div id="label-container"></div>
        
        <div class="decor-paws">⚡ Updates every 3 seconds ⚡</div>
    </div>

    <!-- สคริปต์จาก Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/07LFF4wb1/";
        let model, webcam, labelContainer, maxPredictions;
        let lastPredictTime = 0; // ตัวแปรสำหรับจับเวลา

        async function init() {
            // แสดงกล่องเว็บแคมเมื่อกดเริ่มทำงาน
            document.getElementById("webcam-container").style.display = "block";
            
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); 
            await webcam.play();
            
            // เริ่มต้นจับเวลาการทำนายครั้งแรก
            lastPredictTime = Date.now();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // ล้างค่าเก่า (ถ้ามี)
            for (let i = 0; i < maxPredictions; i++) { 
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update(); // อัปเดตภาพจากเว็บแคมให้ลื่นไหลตลอดเวลา (Real-time)
            
            // ตรวจสอบว่าเวลาผ่านไปครบ 3000 มิลลิวินาที (3 วินาที) หรือยัง
            let currentTime = Date.now();
            if (currentTime - lastPredictTime >= 3000) {
                await predict(); // สั่งให้โมเดลประมวลผลคำนวณ
                lastPredictTime = currentTime; // รีเซ็ตเวลาล่าสุด
            }
            
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                // แสดงผลลัพธ์เป็นไอคอนน้องแมวน่ารักๆ นำหน้าชื่อคลาส
                const classPrediction =
                    "🐱 " + prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>
</body>
</html>
